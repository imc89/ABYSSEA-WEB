    <title id="page-title">ABYSSE_GALLERY</title>

<body style="background: black;" onload="loadFishesPage()">
    <!--  -->
    <div class="card-info-container">
        <div class="card-info">
            <div style="align-self: center;">
                <h1 id="page-h1" style="color: white; width: 300px; text-align: center;margin-left: 15px;"></h1>
            </div>
            <div>
                <p id="page-desc" style="color: white; text-align: center;"></p>
            </div>
        </div>
        <div class="light-img card">
            <img id="main-img" class="glow-img card-img" src="" width="525">
            <div style="margin-top: 10px;">
                <div class="names-list" id="names-list">
                    <!-- Fish list injected dynamically -->
                </div>
                <div class="subcard">
                    <div id="sub-img-container" style="display: none;">
                        <img id="sub-img" class="card-img" src="" width="250">
                        <p id="sub-img-text" style="font-size: 13px;text-align: center;"></p>
                    </div>

                    <div class="card-control">
                        <div class="light-button">
                            <button class="glow-button change-cursor"
                                onclick="window.location.href='../../../../index.html'"> HOME
                            </button>
                        </div>
                        <br>
                        <div class="light-button">
                            <button class="glow-button change-cursor" onclick="window.location.href='../gallery.html'">
                                WHALE VIEW
                            </button>
                        </div>
                        <br>
                        <div class="container-arrow-buttons">
                            <button id="prev-btn" class="arrow arrow-size arrow-button-left change-cursor" disabled>
                                <p class="change-cursor"><i class="arrow up-arrow change-cursor"></i></p>
                            </button>
                            <button id="next-btn" class="arrow arrow-size arrow-button-right change-cursor" disabled>
                                <p class="change-cursor"> <i class="arrow down-arrow change-cursor"></i></p>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- MODAL -->
    <div id="modal-container" class="modal-fullscreen" style="display: none;">
        <div id="modal-content">
        </div>
    </div>

</body>
